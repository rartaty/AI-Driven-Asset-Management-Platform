                example: '03-3000-1234'
                description: |
                              勤務先電話番号
                x-nullable: true
                minLength: 1
                maxLength: 20
              identity_verified:
                type: boolean
                example: true
                description: |
                              本人確認状態  
                              本人確認済：true  
                              本人確認未済：false
                x-nullable: true
              personality:
                type: string
                example: 'personal'
                description: |
                              人格  
                              個人格：personal  
                              法人格：legal
                x-nullable: true
                enum:
                  - 'personal'
                  - 'legal'
              overseas_address:
                type: string
                format: "半角英数字記号"
                example: 'address'
                description: |
                              海外住所
                x-nullable: true
                minLength: 1
                maxLength: 200
              kanji_overseas_address:
                type: string
                format: "全角（漢字情報あり）半角英数字記号"
                example: 'ａｄｄｒｅｓｓ'
                description: |
                              漢字海外住所
                x-nullable: true
                minLength: 1
                maxLength: 200
              reserved_item_1:
                type: string
                format: "全角（漢字情報あり）半角英数字記号"
                example: '予備項目１'
                description: |
                              予備項目１
                x-nullable: true
                minLength: 1
                maxLength: 100
              reserved_item_2:
                type: string
                format: "全角（漢字情報あり）半角英数字記号"
                example: '予備項目２'
                description: |
                              予備項目２
                x-nullable: true
                minLength: 1
                maxLength: 100
              reserved_item_3:
                type: string
                format: "全角（漢字情報あり）半角英数字記号"
                example: '予備項目３'
                description: |
                              予備項目３
                x-nullable: true
                minLength: 1
                maxLength: 100
          headers:
            X-API-LINK-INQUIRY-NO:
              type: string
              format: "半角英数字および-(半角ハイフン)"
              x-example: '20200301-00000000001'
              description: |
                            API連携事業者取引照会番号  
                            リクエストで設定されたものと同一の値を応答する。リクエストで設定されていない場合はヘッダごと存在しない。
              x-nullable: false
              minLength: 1
              maxLength: 50
        '400':
          description: 'Bad Request'
          headers:
            WWW-Authenticate:
              description: |
                            Bearer認証でエラーとなった場合、ヘッダにWWW-Authenticateが設定される。realmはParaSOL-APIのルートが設定される。  
                            Bearer realm="example",error="invalid_client"
              type: string
              format: "半角英数字記号"
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
        '401':
          description: 'Unauthorized'
          headers:
            WWW-Authenticate:
              description: |
                            Bearer認証でエラーとなった場合、ヘッダにWWW-Authenticateが設定される。realmはParaSOL-APIのルートが設定される。  
                            Bearer realm="example",error="invalid_client"
              type: string
              format: "半角英数字記号"
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
        '403':
          description: 'Forbidden'
          headers:
            WWW-Authenticate:
              description: |
                            Bearer認証でエラーとなった場合、ヘッダにWWW-Authenticateが設定される。realmはParaSOL-APIのルートが設定される。  
                            Bearer realm="example",error="invalid_client"
              type: string
              format: "半角英数字記号"
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
        '500':
          description: 'Internal Server Error'
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
        '503':
          description: 'Service Unavailable'
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
        '504':
          description: 'Gateway Timeout'
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
  /banks/{bank_code}/person_authentication:
    get:
      tags: [person_authentication]
      summary: 本人認証連携
      description: |
                    本人認証連携で認証が完了した口座情報を照会する。
      operationId: getPersonAuthentication
      produces:
        - application/json;charset=UTF-8
        - application/problem+json;charset=UTF-8
      parameters:
        - $ref: '#/parameters/AuthorizationHeaderBearer'
        - $ref: '#/parameters/XFFHeader'
        - $ref: '#/parameters/BankCodePath'
        - $ref: '#/parameters/AutoManualModeQuery'
      responses:
        '200':
          description: OK
          schema:
            type: object
            required:
              - inqury_data
              - authentication_type
              - authentication_date
              - authentication_time
            properties:
              inqury_data:
                type: array
                description: |
                              口座情報(リスト)
                items:
                  type: object
                  required:
                    - branch_code
                    - branch_name
                    - account_type_code
                    - account_type_name
                    - account_number
                  properties:
                    branch_code:
                      type: string
                      format: "半角数字"
                      example: '115'
                      description: |
                                    支店コード
                      x-nullable: false
                      minLength: 3
                      maxLength: 3
                    branch_name:
                      type: string
                      format: "全角（漢字情報あり）半角英数字記号"
                      example: '泉岳寺支店'
                      description: |
                                    支店名
                      x-nullable: false
                      minLength: 1
                      maxLength: 30
                    account_type_code:
                      type: string
                      format: "半角数字"
                      example: '1'
                      description: |
                                    預金種目コード
                      x-nullable: false
                      minLength: 1
                      maxLength: 1
                    account_type_name:
                      type: string
                      format: "全角（漢字情報あり）半角英数字記号"
                      example: '普通'
                      description: |
                                    預金種目名
                      x-nullable: false
                      minLength: 1
                      maxLength: 10
                    account_number:
                      type: string
                      format: "半角数字"
                      example: '1234567'
                      description: |
                                    口座番号
                      x-nullable: false
                      minLength: 1
                      maxLength: 7
              authentication_type:
                type: string
                example: "otp"
                description: |
                              認証方式
                              'otp':otp認証
                x-nullable: false
                enum:
                 - 'otp'
              authentication_date:
                type: string
                format: date
                example: "2020-03-01"
                description: |
                              認証日付
                x-nullable: false
                minLength: 10
                maxLength: 10
              authentication_time:
                type: string
                format: "半角数字記号"
                example: "12:30:15+09:00"
                description: |
                              認証時刻
                              hh:mm:ss+09:00の形式で時刻を返却する。
                x-nullable: false
                minLength: 14
                maxLength: 14
        '400':
          description: 'Bad Request'
          headers:
            WWW-Authenticate:
              description: |
                            Bearer認証でエラーとなった場合、ヘッダにWWW-Authenticateが設定される。realmはParaSOL-APIのルートが設定される。  
                            Bearer realm="example",error="invalid_client"
              type: string
              format: "半角英数字記号"
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
        '401':
          description: 'Unauthorized'
          headers:
            WWW-Authenticate:
              description: |
                            Bearer認証でエラーとなった場合、ヘッダにWWW-Authenticateが設定される。realmはParaSOL-APIのルートが設定される。  
                            Bearer realm="example",error="invalid_client"
              type: string
              format: "半角英数字記号"
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
        '403':
          description: 'Forbidden'
          headers:
            WWW-Authenticate:
              description: |
                            Bearer認証でエラーとなった場合、ヘッダにWWW-Authenticateが設定される。realmはParaSOL-APIのルートが設定される。  
                            Bearer realm="example",error="invalid_client"
              type: string
              format: "半角英数字記号"
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
        '404':
          description: 'Not Found'
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
        '500':
          description: 'Internal Server Error'
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
        '503':
          description: 'Service Unavailable'
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
        '504':
          description: 'Gateway Timeout'
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
parameters:
  AuthorizationHeaderBasic:
    in: header
    name: Authorization
    description: |
                  クライアント識別子・パスワード  
                  Basic認証  
                  クライアント識別子とクライアントパスワードをBASE64でエンコードした値を設定する。
    required: true
    type: string
    format: "半角英数字記号"
    x-example: 'Basic MDAxOnBhc3MwMDE='
  AuthorizationHeaderBearer:
    in: header
    name: Authorization
    description: |
                   アクセストークン  
                   アクセストークンをBearer認証の形で設定する。
    type: string
    format: "半角英数字記号"
    required: true
    x-example: 'Bearer ca5723130d3042eea0a6e6b7a97d0100'
  XFFHeader:
    in: header
    name: X-Forwarded-For
    description: |
                   X-Forwarded-For  
                   先頭に利用者端末のIPアドレス(v4)を設定する。 
    type: string
    format: "半角数字記号"
    required: false
    x-example: '192.168.0.1, 192.168.0.2'
  BankCodePath:
    in: path
    name: bank_code
    description: |
                  金融機関コード
    required: true
    type: string
    format: "半角数字"
    x-example: '0001'
    minLength: 4
    maxLength: 4
  AccountIdPath:
    in: path
    name: account_id
    description: |
            口座識別子  
            /accountsで取得した口座識別子を設定する。
    required: true
    type: string
    format: "半角英数字記号"
    x-example: 'p-1-y-1'
    minLength: 7
    maxLength: 29
  AutoManualModeQuery:
    in: query
    name: auto_manual_mode
    description: |
                  自動手動モード  
                  auto=自動 manual=手動  
                  利用者操作契機による要求には「手動」、それ以外の契機の場合は「自動」を設定する。 
    required: false
    type: string
    x-example: 'auto'
    enum:
      - 'auto'
      - 'manual'
definitions:
  AccountResponse:
      type: object
      required:
        - count
        - accounts
        - errors
      properties:
        count:
          type: integer
          example: 10
          description: |
                        口座数  
                        口座一覧照会の場合は取得した口座の件数を、口座情報照会の場合は1を返却する。
          x-nullable: false
          minimum: 0
          maximum: 999
        accounts:
          type: array
          description: |
                        口座一覧(リスト)  
                        対象の口座が存在しない場合、空のリストを返却する。
          items:
            type: object
            required:
              - account_id
              - account_name
              - branch_code
              - branch_name
              - account_type_code
              - account_type
              - account_number
              - account_branch_number
              - investment_trust_account_type
              - currency_code
              - ttb
              - rate_base_date
              - rate_base_time
              - current_balance
              - withdrawable_balance
              - previous_day_balance
              - previous_month_balance
              - stage_name
              - point
              - interest_rate
              - base_date
              - base_time
              - online_transaction_date_from
              - offline_transaction_date_from
              - cardloan_possible_balance
              - cardloan_interest_amount
              - _links
              - division_for_personal_transfers
              - payout_limited_account_division
              - error
              - error_description
            properties:
              account_id:
                type: string
                format: "半角英数字記号"
                example: 'p-12345678-y-1234'
                description: |
                              口座識別子
                x-nullable: false
                minLength: 7
                maxLength: 29
              account_name:
                type: string
                format: "半角全角"
                example: '本店営業部　普通　USD'
                description: |
                              口座名  
                              支店名と科目名をスペース区切りで結合し設定する。  
                              外貨口座の場合は、ISO4217で規定されている通貨コードもスペース区切りで結合し設定する。
                x-nullable: false
                minLength: 3
                maxLength: 45
              branch_code:
                type: string
                format: "半角数字"
                example: '001'
                description: |
                              支店コード
                x-nullable: false
                minLength: 3
                maxLength: 3
              branch_name:
                type: string
                format: "半角全角"
                example: '本店営業部'
                description: |
                              支店名
                x-nullable: false
                minLength: 1
                maxLength: 30
              account_type_code:
                type: string
                format: "半角英数字"
                example: '1'
                description: |
                              預金種目コード  
                              円貨口座の場合は1-9、外貨口座の場合はA-I、投信口座の場合はNullを設定する。
                x-nullable: true
                minLength: 1
                maxLength: 1
              account_type:
                type: string
                format: "全角"
                example: '普通'
                description: |
                              預金種目名
                x-nullable: false
                minLength: 1
                maxLength: 10
              account_number:
                type: string
                format: "半角数字"
                example: '1234567'
                description: |
                              口座番号
                x-nullable: false
                minLength: 1
                maxLength: 10
              account_branch_number:
                type: string
                format: "半角数字"
                example: '0'
                description: |
                              口座枝番  
                              該当する口座が外貨口座の場合、口座枝番を設定する。  
                              外貨口座以外の場合、Nullを設定する。
                x-nullable: true
                minLength: 1
                maxLength: 5
              investment_trust_account_type:
                type: string
                example: 'general'
                description: |
                              投信口座種類  
                              該当する口座が投信口座の場合、投信口座種類を設定する。  
                              general=一般  
                              specific_withholding=特定口座/源泉徴収あり  
                              specific_not_withholding=特定口座/源泉徴収なし  
                              投信口座以外の場合、Nullを設定する。
                x-nullable: true
                enum:
                 - 'general'
                 - 'specific_withholding'
                 - 'specific_not_withholding'
              currency_code:
                type: string
                format: "半角英字"
                example: 'USD'
                description: |
                              通貨コード  
                              ISO4217で規定されているコードを設定する。
                x-nullable: false
                minLength: 3
                maxLength: 3
              ttb:
                type: number
                example: 100.55
                description: |
                              外貨払出適用レート  
                              外貨払出適用レート(TTB)を設定する。  
                              外貨口座以外の場合、Nullを設定する。
                x-nullable: true
                minimum: 0
                maximum: 999999.99
              rate_base_date:
                type: string
                format: date
                example: '2018-01-01'
                description: |
                              外貨レート基準日  
                              外貨口座以外の場合、Nullを設定する。
                x-nullable: true
                minLength: 10
                maxLength: 10
              rate_base_time:
                type: string
                format: "半角数字記号"
                example: '12:30:00+09:00'
                description: |
                              外貨レート基準時刻  
                              レートの設定時刻をhh:mm:00+09:00の形式で時刻を返却する。  
                              外貨口座以外の場合、Nullを設定する。
                x-nullable: true
                minLength: 14
                maxLength: 14
              current_balance:
                type: number
                example: 2200000
                description: |
                             現在残高  
                             外貨口座の場合、外貨残高を設定する。（円換算額でない）  
                             投信口座の場合、評価金額を設定する。
                x-nullable: true
                minimum: -999999999999.99
                maximum: 999999999999999
              withdrawable_balance:
                type: number
                example: 3200000
                description: |
                              支払可能残高  
                              円貨口座以外の場合、Nullを設定する。
                x-nullable: true
                minimum: 0
                maximum: 99999999999
              previous_day_balance:
                type: number
                example: 2000000
                description: |
                              前日残高  
                              円貨口座以外の場合、Nullを設定する。
                x-nullable: true
                minimum: -99999999999
                maximum: 99999999999
              previous_month_balance:
                type: number
                example: 1200000
                description: |
                              前月末残高  
                              円貨口座以外の場合、Nullを設定する。
                x-nullable: true
                minimum: -99999999999
                maximum: 99999999999
              stage_name:
                type: string
                format: "全角"
                example: 'XXXステージ'
                description: |
                              ステージ名  
                              円貨口座以外の場合、Nullを設定する。
                x-nullable: true
                minLength: 1
                maxLength: 16
              point:
                type: number
                example: 0
                description: |
                             ポイント  
                             円貨口座以外の場合、Nullを設定する。
                x-nullable: true
                minimum: 1
                maximum: 99999999999
              interest_rate:
                type: number
                example: 0.002
                description: |
                              金利  
                              外貨口座以外の場合、Nullを設定する。
                x-nullable: true
                minimum: 0
                maximum: 99999999
              base_date:
                type: string
                format: date
                example: '2018-01-01'
                description: |
                              基準日
                x-nullable: true
                minLength: 10
                maxLength: 10
              base_time:
                type: string
                format: "半角数字記号"
                example: '12:30:00+09:00'
                description: |
                              基準時刻  
                              hh:mm:00+09:00の形式で時刻を返却する。  
                              投信口座の場合、Nullを返却する。
                x-nullable: true
                minLength: 14
                maxLength: 14
              online_transaction_date_from:
                type: string
                format: date
                example: '2017-03-01'
                description: |
                              オンライン照会方式照会可能開始日  
                              オンライン方式で取得可能な入出金取引明細範囲指定開始日付をYYYY-MM-DD形式で設定する。
                x-nullable: true
                minLength: 10
                maxLength: 10
              offline_transaction_date_from:
                type: string
                format: date
                example: '2016-03-01'
                description: |
                              オフライン照会方式照会可能開始日  
                              オフライン方式で取得可能な入出金取引明細範囲指定開始日付をYYYY-MM-DD形式で設定する。
                x-nullable: true
                minLength: 10
                maxLength: 10
              cardloan_possible_balance:
                type: number
                example: 1000000
                description: |
                              カードローン借入可能額
                x-nullable: true
                minimum: 0
                maximum: 99999999999
              cardloan_interest_amount:
                type: number
                example: 7350
                description: |
                              カードローン利息
                x-nullable: true
                minimum: 0
                maximum: 99999999999
              division_for_personal_transfers:
                type: string
                example: '0'
                description: |
                              振込・振替（振替）先設定区分  
                              円貨口座の場合は'0'：「設定不可」、'1'：「設定可」
                              円貨口座以外の場合はnullを返却する。
                x-nullable: true
                minLength: 1
                maxLength: 1
              payout_limited_account_division:
                type: string
                example: '0'
                description: |
                              払出制限口座区分  
                              円貨口座の場合は'0'：「制限なし」、'1'：「制限あり」
                              円貨口座以外の場合はnullを返却する。
                x-nullable: true
                minLength: 1
                maxLength: 1
              web_passbook_use:
                type: number
                example: 1
                description: |
                              WEB口座利用区分  
                              0：「非WEB口座」、1：「WEB口座」
                x-nullable: false
                minimum: 0
                maximum: 1
              _links:
                type: object
                required:
                  - self
                description: |
                              リンク  
                              本口座に対して実行可能なAPIを設定する。
                properties:
                  self:
                    type: object
                    required:
                      - href
                    description: |
                                  口座情報照会  
                                  口座情報照会のURIを設定する。
                    properties:
                      href: 
                        type: string
                        format: "半角英数字記号"
                        description: |
                                      URI
                        example: "https://sample.apigw.opencanvas.ne.jp/parasol/v1/banks/{bank_code}/accounts/{account_id}"
                  transactions:
                    type: object
                    required:
                      - href
                    description: |
                                  入出金明細照会  
                                  入出金明細照会が実行可能な場合、入出金明細照会のURIを設定する。
                    properties:
                      href: 
                        type: string
                        format: "半角英数字記号"
                        description: |
                                      URI
                        example: "https://sample.apigw.opencanvas.ne.jp/parasol/v1/banks/{bank_code}/accounts/{account_id}/transactions"
                  term_deposits:
                    type: object
                    required:
                      - href
                    description: |
                                  定期保有明細照会  
                                  定期保有明細照会が実行可能な口座の場合、定期保有明細照会のURIを設定する。
                    properties:
                      href: 
                        type: string
                        format: "半角英数字記号"
                        description: |
                                      URI
                        example: "https://sample.apigw.opencanvas.ne.jp/parasol/v1/banks/9932/{bank_code}/accounts/{account_id}/term_deposits"
                  funds:
                    type: object
                    required:
                      - href
                    description: |
                                  投信保有明細照会  
                                  投信保有明細照会が実行可能な口座の場合、投信保有明細照会のURIを設定する。
                    properties:
                      href: 
                        type: string
                        format: "半角英数字記号"
                        description: |
