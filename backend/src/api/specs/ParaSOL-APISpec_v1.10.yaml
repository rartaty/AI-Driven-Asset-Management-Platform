  /banks/{bank_code}/accounts/{account_id}/investment_profit_and_loss':
    get:
      tags:
        - accounts
      summary: 投信運用損益照会
      description: 指定した口座の投信運用損益を照会する。
      operationId: getInvestment
      produces:
        - application/json;charset=UTF-8
        - application/problem+json;charset=UTF-8
      parameters:
        - $ref: '#/parameters/AuthorizationHeaderBearer'
        - $ref: '#/parameters/XFFHeader'
        - $ref: '#/parameters/BankCodePath'
        - $ref: '#/parameters/AccountIdPath'
        - $ref: '#/parameters/AutoManualModeQuery'
      responses:
        '200':
          description: OK
          schema:
            type: object
            required:
              - account_id
              - base_date
              - has_next
              - count
              - funds
              - total_funds
            properties:
              account_id:
                type: string
                format: 半角英数字記号
                example: p-12345678-i-1234
                description: |
                  口座識別子
                x-nullable: false
                minLength: 7
                maxLength: 29
              base_date:
                type: string
                format: date
                example: '2018-01-01'
                description: |
                  基準日
                x-nullable: true
                minLength: 10
                maxLength: 10
              has_next:
                type: boolean
                example: false
                description: |
                  継続情報(next)  
                  本APIでは一括で明細を返却するためfalseを返却する。
                enum:
                  - false
                x-nullable: false
              count:
                type: integer
                example: 10
                description: |
                  取得運用損益件数  
                  取得した運用損益件数を設定する。
                x-nullable: false
                minimum: 0
                maximum: 9999
              funds:
                type: array
                description: |
                  運用損益一覧(リスト)
                items:
                  type: object
                  required:
                    - fund_name
                    - fund_id
                    - investment_type
                    - handling_of_dividend
                    - unit
                    - net_asset_value
                    - value_at_cancellation
                    - appraisal_value
                    - investment_value
                    - beneficiary_value
                    - dividend_price
                    - disposal_value
                    - investment_profit_and_loss
                  properties:
                    fund_name:
                      type: string
                      format: 半角全角
                      example: ＡＮＳＥＲ新興国毎月決算型ファンド（分配金受取りコース）
                      description: |
                        ファンド名
                      x-nullable: false
                      minLength: 1
                      maxLength: 128
                    fund_id:
                      type: string
                      format: 半角数字
                      example: '22000002'
                      description: |
                        ファンドID  
                        金融機関独自のファンド識別コード
                      x-nullable: false
                      minLength: 8
                      maxLength: 8
                    investment_type:
                      type: string
                      example: general
                      description: |
                        預り区分  
                        general=一般 specific=特定 nisa=NISA deposit_nisa=つみたてNISA
                      enum:
                        - general
                        - specific
                        - nisa
                        - deposit_nisa
                      x-nullable: true
                    handling_of_dividend:
                      type: string
                      example: payout
                      description: |
                        一般累投区分  
                        payout=一般 reinvestment=累投
                      enum:
                        - payout
                        - reinvestment
                      x-nullable: false
                    unit:
                      type: integer
                      format: int64
                      example: 94069
                      description: |
                        保有口数
                      x-nullable: false
                      minimum: 0
                      maximum: 99999999999
                    net_asset_value:
                      type: number
                      example: 10102
                      description: |
                        基準価額
                      x-nullable: true
                      minimum: 0
                      maximum: 999999999999999
                    value_at_cancellation:
                      type: number
                      example: 10102
                      description: |
                        解約価額
                      x-nullable: true
                      minimum: 0
                      maximum: 999999999999999
                    appraisal_value:
                      type: number
                      example: 95029
                      description: |
                        評価金額
                      x-nullable: true
                      minimum: 0
                      maximum: 999999999999999
                    investment_value:
                      type: number
                      example: 13989
                      description: |
                        投資金額
                      x-nullable: true
                      minimum: 0
                      maximum: 999999999999999
                    beneficiary_value:
                      type: number
                      example: 182043
                      description: |
                        受取金額
                      x-nullable: true
                      minimum: 0
                      maximum: 999999999999999
                    dividend_price:
                      type: number
                      example: 770
                      description: |
                        受取分配金
                      x-nullable: true
                      minimum: 0
                      maximum: 999999999999999
                    disposal_value:
                      type: number
                      example: 9824
                      description: |
                        売却金額
                      x-nullable: true
                      minimum: 0
                      maximum: 999999999999999
                    investment_profit_and_loss:
                      type: number
                      example: 10189
                      description: |
                        運用損益
                      x-nullable: true
                      minimum: -999999999999999
                      maximum: 999999999999999
              total_funds:
                type: array
                description: |
                  合計金額一覧(リスト)
                items:
                  type: object
                  required:
                    - keeping_division
                    - total_appraisal_value
                    - total_beneficiary_value
                    - total_dividend_price
                    - total_disposal_value
                    - total_investment_value
                    - total_investment_profit_and_loss
                  properties:
                    keeping_division:
                      type: string
                      example: general
                      description: |
                        預り区分  
                        general=一般 specific=特定 nisa=NISA deposit_nisa=つみたてNISA
                      enum:
                        - general
                        - specific
                        - nisa
                        - deposit_nisa
                      x-nullable: true
                    total_appraisal_value:
                      type: number
                      example: 13989
                      description: |
                        評価金額合計
                      x-nullable: true
                      minLength: 0
                      maxLength: 999999999999999
                    total_beneficiary_value:
                      type: number
                      example: 182043
                      description: |
                        受取金額合計
                      x-nullable: true
                      minimum: 1
                      maximum: 999999999999999
                    total_dividend_price:
                      type: number
                      example: 9824
                      description: |
                        受取分配金合計
                      x-nullable: true
                      minimum: 0
                      maximum: 999999999999999
                    total_disposal_value:
                      type: number
                      example: 9824
                      description: |
                        売却金額合計
                      x-nullable: true
                      minimum: 0
                      maximum: 999999999999999
                    total_investment_value:
                      type: number
                      example: 5000
                      description: |
                        投資金額合計
                      x-nullable: true
                      minimum: 0
                      maximum: 999999999999999
                    total_investment_profit_and_loss:
                      type: number
                      example: 10189
                      description: |
                        運用損益合計
                      x-nullable: true
                      minimum: -999999999999999
                      maximum: 999999999999999
        '400':
          description: 'Bad Request'
          headers:
            WWW-Authenticate:
              description: |
                            Bearer認証でエラーとなった場合、ヘッダにWWW-Authenticateが設定される。realmはParaSOL-APIのルートが設定される。  
                            Bearer realm="example",error="invalid_client"
              type: string
