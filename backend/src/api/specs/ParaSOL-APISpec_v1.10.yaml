      parameters:
        - $ref: '#/parameters/AuthorizationHeaderBearer'
        - $ref: '#/parameters/XFFHeader'
        - $ref: '#/parameters/BankCodePath'
        - $ref: '#/parameters/AccountIdPath'
        - $ref: '#/parameters/AutoManualModeQuery'
      responses:
        '200':
          description: OK
          schema:
            type: object
            required:
              - account_id
              - product_name
              - contract_date
              - contract_term
              - monthly_repayment_date
              - monthly_repayment_amount
              - interest_rate
              - base_date
              - base_time
              - loan_balance
              - interest_amount
              - unpaid_interest_amount
              - unpaid_principal
              - credit_line
              - loan_possible_balance
              - automatic_extension_type
              - payment_branch_name
              - payment_subject_name
              - payment_account_number
              - borrowing_flag
              - payment_flag
            properties:
              account_id:
                type: string
                format: "半角英数字記号"
                example: 'p-12345678-y-1234'
                description: |
                              口座識別子
                x-nullable: false
                minLength: 7
                maxLength: 29
              product_name:
                type: string
                format: "半角全角"
                example: 'データ銀行カードローン'
                description: |
                              カードローン商品名
                x-nullable: true
                minLength: 1
                maxLength: 50
              contract_date:
                type: string
                format: date
                example: '2012-01-01'
                description: |
                              契約日
                x-nullable: true
                minLength: 10
                maxLength: 10
              contract_term:
                type: string
                format: "半角全角"
                example: '5年'
                description: |
                              契約期間
                x-nullable: true
                minLength: 2
                maxLength: 3
              monthly_repayment_date:
                type: string
                format: "半角全角"
                example: '1日'
                description: |
                              毎月返済日
                x-nullable: true
                minLength: 2
                maxLength: 3
              monthly_repayment_amount:
                type: number
                example: 20000
                description: |
                              毎月返済金額
                x-nullable: true
                minimum: 0
                maximum: 99999999999
              interest_rate:
                type: number
                example: 10.5
                description: |
                              金利
                x-nullable: true
                minimum: 0
                maximum: 99999999
              base_date:
                type: string
                format: date
                example: '2018-01-01'
                description: |
                              基準日
                x-nullable: true
                minLength: 10
                maxLength: 10
              base_time:
                type: string
                format: "半角数字記号"
                example: '12:30:00+09:00'
                description: | 
                              基準時刻
                              時刻をhh:mm:00+09:00の形式で時刻を返却する。
                x-nullable: true
                minLength: 14
                maxLength: 14
              loan_balance:
                type: number
                example: 70000
                description: |
                              借入残高
                x-nullable: true
                minimum: 0
                maximum: 99999999999
              interest_amount:
                type: number
                example: 7350
                description: |
                              利息
                x-nullable: true
                minimum: 0
                maximum: 99999999999
              unpaid_principal:
                type: number
                example: 10000
                description: |
                              未払元金
                x-nullable: true
                minimum: 0
                maximum: 99999999999
              unpaid_interest_amount:
                type: number
                example: 1000
                description: |
                              未払利息
                x-nullable: true
                minimum: 0
                maximum: 99999999999
              credit_line:
                type: number
                example: 1000000000
                description: | 
                              利用限度額  
                x-nullable: true
                minimum: 0
                maximum: 99999999999
              loan_possible_balance:
                type: number
                example: 999990000
                description: |
                              借入可能額
                x-nullable: true
                minimum: 0
                maximum: 99999999999
              automatic_extension_type:
                type: string
                description: |
                              契約期間満期時自動更新区分
                              '0':対象外 '1':対象  
                example: '1'
                x-nullable: true
              payment_branch_name:
                type: string
                format: "半角全角"
                description: |
                              返済口座支店名
                example: '泉岳寺支店'
                x-nullable: true
                minLength: 1
                maxLength: 30
              payment_subject_name:
                type: string
                format: "全角"
                description: |
                              返済口座科目名
                example: '普通'
                x-nullable: true
                minLength: 1
                maxLength: 10
              payment_account_number:
                type: string
                format: "半角数字"
                description: |
                              返済口座番号
                example: '1234567'
                x-nullable: true
                minLength: 1
                maxLength: 10
              borrowing_flag:
                type: string
                format: "半角数字"
                description: |
                              借入可否
                              '0':利用可 '1':利用不可  
                example: '1'
                x-nullable: true
              payment_flag:
                type: string
                format: "半角数字"
                description: |
                              返済可否
                              '0':利用可 '1':利用不可  
                example: '0'
                x-nullable: true

        '400':
          description: 'Bad Request'
