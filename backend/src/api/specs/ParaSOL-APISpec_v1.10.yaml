  /banks/{bank_code}/personal_transfers/submissions:
    post:
      tags: [personal_transfers]
      summary: 振替実行
      description: 指定した口座へ振替を行う。
      operationId: submitPersonalTransfersRequest
      consumes:
        - application/json
      produces:
        - application/json;charset=UTF-8
        - application/problem+json;charset=UTF-8
      parameters:
        - $ref: '#/parameters/AuthorizationHeaderBearer'
