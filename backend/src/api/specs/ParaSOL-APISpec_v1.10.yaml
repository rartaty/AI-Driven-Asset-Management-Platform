        - in: body
          name: request_body
          required: true
          description: |
                        振替実行情報
          schema:
            type: object
            required:
            - account_id
            - remote_branch_code
            - remote_account_type_code
            - remote_account_number
            - transfer_amount
            properties:
              account_id:
                type: string
                format: "半角英数字記号"
                description: |
                              口座識別子  
                              口座一覧照会で取得した口座識別子を設定する。
                example: 'p-1-y-1'
                minLength: 7
                maxLength: 29
