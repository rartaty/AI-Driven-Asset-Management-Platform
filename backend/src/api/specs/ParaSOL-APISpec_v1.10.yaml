swagger: '2.0'
info:
  version: '1.10'
  title:  AnserParaSOL API
  description: |
                本サービスでは、金融機関の設定や利用者の利用状況によって特定の項目の返却値が存在しない場合がある。  
                返却値が存在しない場合、一律Nullを返却する。  
                ただし、アクセストークン発行・再発行と口座一覧照会、口座情報照会の_links配下の項目は返却値が存在しない場合、項目ごと削除とする。  
                  
                本サービスでは以下のステータスコードを応答する。  
                |HTTPステータスコード|付与基準|
                |:-:|:-|
                |200|正常応答|
                |400|クライアントエラー/口座状態や利用者状態による一時的な照会エラー|
                |401|Basic認証/Bearer認証エラー|
                |403|スコープエラー/APIが使用不可|
                |404|リソースなし|
                |500|システムエラー|
                |503|輻輳/閉塞/サービス時間外|
                |504|タイムアウト|
  
  
                レスポンスのContent-Typeは以下のとおり。  
                ■アクセストークン発行・再発行  
                  Content-Typeは「application/json;charset=UTF-8」となる。  
                ■上記以外のAPI  
                  ステータスコードが200の場合、Content-Typeは「application/json;charset=UTF-8」となる。  
                  ステータスコードが200以外の場合、Content-Typeは「application/problem+json;charset=UTF-8」となる。

basePath: /parasol/v1 
schemes:
  - https
host: sample.apigw.opencanvas.ne.jp
paths:
  /banks/{bank_code}/oauth/auth:
    get:
      tags: [OAuth]
      summary: API連携認証
      description: 利用者に認証・認可を求め、認可の結果を受け取る。
      operationId: auth
      parameters:
        - $ref: '#/parameters/XFFHeader'
        - $ref: '#/parameters/BankCodePath'
        - in: query
          name: response_type
          description: |
                        レスポンスタイプ  
                        「code」のみ許可する。
          required: true
          type: string
          x-example: 'code'
          enum:
            - 'code'
        - in: query
          name: client_id
          description: |
                        クライアント識別子
          required: true
          type: string
          format: "半角英数字"
          x-example: 'Finte001'
          minLength: 8
          maxLength: 8
        - in: query
          name: redirect_uri
          description: |
                        リダイレクトURL
          required: true
          type: string
          format: "半角英数字記号"
          x-example: 'https://example.com'
          minLength: 1
          maxLength: 256
        - in: query
          name: state
          description: |
                        ステート  
                        利用者による認可が得られた場合、ステートをAPI連携事業者に返却する。  
                        API連携事業者はAPI連携認証リクエスト時に送信したステートと同一か確認する。
          required: false
          type: string
          format: "半角英数字記号"
          x-example: '1111'
          minLength: 1
          maxLength: 256
        - in: query
          name: scope
          description: |
                        スコープ  
                        複数業務を設定する場合は、半角スペース区切りとする。また、設定値の順序に関係は無い。  
                        アクセス可能な機能に制限を設けるために以下を設定。  
                        ・accounts：照会業務  
                        ・personal_transfers：振込・振替（振替）  
                        ・registration_transfers：振込・振替(事前登録）  
                        ・registration_apiservice_settlements：振込・振替（ＡＰＩ連携サービス決済）  
                        ・personal_information：契約者情報照会  
                        ・person_authentication：本人認証連携  
                        
                        ※「person_authentication」以外のスコープ設定時には「accounts」の設定必須   
                        ※「person_authentication」の設定時には他スコープの設定不可  
                        ※「personal_information」を含む場合、リフレッシュトークンによるアクセストークンの再発行不可（都度利用者による認可が必要）
          required: false
          type: string
          format: "半角英数字記号"
          x-example: 'accounts personal_transfers'
        - in: query
          name: branch_code
          description: |
                        支店コード
                        スコープに「person_authentication」設定された時のみ支店コードの設定が可能
                        本人認証連携画面の入力補完に使用
          required: false
          type: string
          format: "半角数字"
          x-example: '001'
          minLength: 3
          maxLength: 3
        - in: query
          name: account_type_code
          description: |
                        預金種目コード
                        スコープに「person_authentication」設定された時のみ預金種目コードの設定が可能
                        本人認証連携画面の入力補完に使用
          required: false
          type: string
          format: "半角数字"
          x-example: '1'
          minLength: 1
          maxLength: 1
        - in: query
          name: account_number
          description: |
                        口座番号
                        スコープに「person_authentication」設定された時のみ口座番号の設定が可能
                        本人認証連携画面の入力補完に使用
          required: false
          type: string
          format: "半角数字"
          x-example: '1234567'
          minLength: 1
          maxLength: 7
        - in: query
          name: authentication_type
          description: |
                        認証方式
                        otp=ワンタイムパスワード認証
                        スコープに「person_authentication」設定された時に認証方式を設定する。
          enum:
           - 'otp'
          required: false
          type: string
          x-example: 'otp'
        - in: query
          name: bankauth
          description: |
                        スマートフォンアプリ認証  
                        「on」を指定した場合、API連携認証（スマホアプリ認証）画面に遷移する。
          enum:
           - 'on'
          required: false
          type: string
          x-example: 'on'
      responses:
        '302':
         description: Found
         headers:
           Location:
             description: |
                           利用者が認可した場合は、「 {リダイレクトURL}?code={認可コード}&state={ステート}」が設定される。  
                           利用者が操作を中止した場合や、なんらかの異常が発生した場合は、「 {リダイレクトURL}?error={エラーコード}&error_description={エラーメッセージ}&state={ステート}」が設定される。
             type: string
  /banks/{bank_code}/oauth/token:
    post:
      tags: [OAuth]
      summary: アクセストークン発行・再発行
      description: アクセストークンを発行、または再発行する。
      operationId: token
      consumes:
        - application/x-www-form-urlencoded
      produces:
        - application/json;charset=UTF-8
      parameters:
        - $ref: '#/parameters/AuthorizationHeaderBasic'
        - $ref: '#/parameters/XFFHeader'
        - $ref: '#/parameters/BankCodePath'
        - in: formData
          name: grant_type
          description: |
                        グラントタイプ  
                        アクセストークン発行時はauthorization_code、アクセストークン再発行時はrefresh_tokenを指定する。
          required: true
          type: string
          x-example: 'authorization_code'
          enum:
            - 'authorization_code'
            - 'refresh_token'
        - in: formData
          name: code
          description: |
                        認可コード  
                        グラントタイプにauthorization_code選択時は設定する。refresh_token選択時は設定しない。
          required: false
          type: string
          format: "半角英数字"
          x-example: 'au5723130d3042eea0a6e6b7a97d0001'
          minLength: 32
          maxLength: 32
        - in: formData
          name: redirect_uri
          description: |
                        リダイレクトＵＲＬ  
                        API連携認証で指定したリダイレクトＵＲＬ。  
                        グラントタイプにauthorization_code選択時は設定する。refresh_token選択時は設定しない。
          required: false
          type: string
          format: "半角英数字記号"
          x-example: 'https://example.com'
          minLength: 1
          maxLength: 256
        - in: formData
          name: refresh_token
          description: |
                        リフレッシュトークン  
                        グラントタイプにrefresh_token選択時は設定する。authorization_code選択時は設定しない。
          required: false
          type: string
          format: "半角英数字"
          x-example: 'ac5723130d3042eea0a6e6b7a97d0001'
          minLength: 32
          maxLength: 32
        - in: formData
          name: auto_manual_mode
          description: |
                        自動手動モード  
                        auto=自動 manual=手動  
                        グラントタイプにrefresh_token選択時は設定する。authorization_code選択時は設定しない。  
                        利用者操作契機による要求には「手動」、それ以外の契機の場合は「自動」を設定する。
          required: false
          type: string
          x-example: 'auto'
          enum:
            - 'auto'
            - 'manual'
      responses:
        '200':
          description: OK
          schema:
            type: object
            required:
              - access_token
              - token_type
              - expires_in
              - refresh_token
              - scope
            properties:
              access_token:
                type: string
                format: "半角英数字"
                example: '7d0e8fddb23a40a2b5f73c2771e9c4c7'
                description: |
                              アクセストークン
                x-nullable: false
                minLength: 32
                maxLength: 32
              token_type:
                type: string
                example: 'Bearer'
                description: |
                              トークンタイプ  
                              「Bearer」のみ設定する。
                enum:
                  - 'Bearer'
                x-nullable: false
              expires_in:
                type: integer
                example: 3600
                description: |
                              アクセストークン有効期間  
                              秒数を設定する。
                x-nullable: false
                minimum: 1
                maximum: 59940
              refresh_token:
                type: string
                format: "半角英数字"
                example: 'ca5723130d3042eea0a6e6b7a97d0455'
                description: |
                              リフレッシュトークン
                x-nullable: false
                minLength: 32
                maxLength: 32
              user_id:
                type: string
                format: "半角数字"
                example: '99999901'
                description: |
                              契約者通番  
                              AnserParaSOLにおいて利用者を一意に識別する番号  
                              グラントタイプにauthorization_codeを選択した時のみ含まれる。  
                              金融機関やAnserParaSOLへ問い合わせる際に利用する。
                x-nullable: false
                minLength: 1
                maxLength: 8
              refresh_token_limit_date:
                type: string
                format: date
                example: '2015-12-12'
                description: |
                              リフレッシュトークン有効期限  
                              グラントタイプにauthorization_codeを選択した時のみ含まれる。
                x-nullable: false
                minLength: 10
                maxLength: 10
              scope:
                type: string
                format: "半角英数字記号"
                example: 'accounts'
                description: |
                              スコープ  
                              認可時に複数業務が設定されている場合は、半角スペース区切りとする。また、設定値の順序に関係は無い。  
                              ・accounts：照会業務  
                              ・personal_transfers：振込・振替（振替）  
                              ・registration_transfers：振込・振替(事前登録）  
                              ・registration_apiservice_settlements：振込・振替（ＡＰＩ連携サービス決済）  
                              ・personal_information：契約者情報照会  
                              ・person_authentication：本人認証連携  
                              
                              認可時にスコープを指定しなかった場合は、「accounts」が設定される。
                x-nullable: false
        '400':
          description: 'Bad Request'
          schema:
            $ref: '#/definitions/RFC6749ErrorResponse'
        '401':
          description: 'Unauthorized'
          headers:
            WWW-Authenticate:
              description: |
                            Basic認証でエラーとなった場合、ヘッダにWWW-Authenticateが設定される。realmはParaSOL-APIのルートが設定される。  
                            Basic realm="example",error="invalid_client"
              type: string
              format: "半角英数字記号"
          schema:
            $ref: '#/definitions/RFC6749ErrorResponse'
        '403':
          description: 'Forbidden'
          schema:
            $ref: '#/definitions/RFC6749ErrorResponse'
        '500':
          description: 'Internal Server Error'
          schema:
            $ref: '#/definitions/RFC6749ErrorResponse'
        '503':
          description: 'Service Unavailable'
          schema:
            $ref: '#/definitions/RFC6749ErrorResponse'
        '504':
          description: 'Gateway Timeout'
          schema:
            $ref: '#/definitions/RFC6749ErrorResponse'
  /banks/{bank_code}/oauth/revoke:
    post:
      tags: [OAuth]
      summary: トークン失効
      description: |
                    トークンを失効させる。  
                    削除対象のトークンがアクセストークンである場合、契約者に紐付くリフレッシュトークンも無効にする。  
                    削除対象のトークンがリフレッシュトークンである場合、契約者に紐付くアクセストークンも無効にする。
      operationId: revoke
      consumes:
        - application/x-www-form-urlencoded
      produces:
        - application/json;charset=UTF-8
      parameters:
        - $ref: '#/parameters/AuthorizationHeaderBasic'
        - $ref: '#/parameters/XFFHeader'
        - $ref: '#/parameters/BankCodePath'
        - in: formData
          name: token
          description: |
                        トークン  
                        削除対象のアクセストークンもしくはリフレッシュトークンを設定する。
          required: true
          type: string
          format: "半角英数字"
          x-example: 'ca5723130d3042eea0a6e6b7a97d0001'
          minLength: 32
          maxLength: 32
      responses:
        '200':
          description: OK
        '400':
          description: 'Bad Request'
          schema:
            $ref: '#/definitions/RFC6749ErrorResponse'
        '401':
          description: 'Unauthorized'
          headers:
            WWW-Authenticate:
              description: |
                            Basic認証でエラーとなった場合、ヘッダにWWW-Authenticateが設定される。realmはParaSOL-APIのルートが設定される。  
                            Basic realm="example",error="invalid_client"
              type: string
              format: "半角英数字記号"
          schema:
            $ref: '#/definitions/RFC6749ErrorResponse'
        '403':
          description: 'Forbidden'
          schema:
            $ref: '#/definitions/RFC6749ErrorResponse'
        '500':
          description: 'Internal Server Error'
          schema:
            $ref: '#/definitions/RFC6749ErrorResponse'
        '503':
          description: 'Service Unavailable'
          schema:
            $ref: '#/definitions/RFC6749ErrorResponse'
        '504':
          description: 'Gateway Timeout'
          schema:
            $ref: '#/definitions/RFC6749ErrorResponse'
  /banks/{bank_code}/accounts:
    get:
      tags: [accounts]
      summary: 口座一覧照会
      description: |
                    契約者が保有する口座情報を照会する。  
                    保有する投信口座の情報が取得できない場合には、口座取得エラー一覧(リスト)にエラー情報を設定し投信口座以外の口座情報を返却する。
                    口座の残高情報のみ取得できない場合には、対象口座にエラー情報を設定し正常レスポンスを返却する。
      operationId: getAccounts
      produces:
        - application/json;charset=UTF-8
        - application/problem+json;charset=UTF-8
      parameters:
        - $ref: '#/parameters/AuthorizationHeaderBearer'
        - $ref: '#/parameters/XFFHeader'
        - $ref: '#/parameters/BankCodePath'
        - $ref: '#/parameters/AutoManualModeQuery'
        - in: query
          name: account_classification
          description: |
                        口座分類  
                        取得対象の口座分類を指定する。  
                        yen_currency_account=円貨口座を取得  
                        未指定時はすべての口座分類を取得対象とする。
          required: false
          type: string
          x-example: 'yen_currency_account'
          enum:
           - 'yen_currency_account'
      responses:
        '200':
          description: 'OK'
          schema:
            $ref: '#/definitions/AccountResponse'
        '400':
          description: 'Bad Request'
          headers:
            WWW-Authenticate:
              description: |
                            Bearer認証でエラーとなった場合、ヘッダにWWW-Authenticateが設定される。realmはParaSOL-APIのルートが設定される。  
                            Bearer realm="example",error="invalid_client"
              type: string
              format: "半角英数字記号"
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
        '401':
          description: 'Unauthorized'
          headers:
            WWW-Authenticate:
              description: |
                            Bearer認証でエラーとなった場合、ヘッダにWWW-Authenticateが設定される。realmはParaSOL-APIのルートが設定される。  
                            Bearer realm="example",error="invalid_client"
              type: string
              format: "半角英数字記号"
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
        '403':
          description: 'Forbidden'
          headers:
            WWW-Authenticate:
              description: |
                            Bearer認証でエラーとなった場合、ヘッダにWWW-Authenticateが設定される。realmはParaSOL-APIのルートが設定される。  
                            Bearer realm="example",error="invalid_client"
              type: string
              format: "半角英数字記号"
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
        '404':
          description: 'Not Found'
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
        '500':
          description: 'Internal Server Error'
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
        '503':
          description: 'Service Unavailable'
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
        '504':
          description: 'Gateway Timeout'
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
  /banks/{bank_code}/accounts/{account_id}:
    get:
      tags: [accounts]
      summary: 口座情報照会
      description: |
                    指定した口座の口座情報を照会する。  
                    本APIは口座一覧照会と同等の情報返却するため、同一のJSON構造でレスポンスを返却する。
      operationId: getAccount
      produces:
        - application/json;charset=UTF-8
        - application/problem+json;charset=UTF-8
      parameters:
        - $ref: '#/parameters/AuthorizationHeaderBearer'
        - $ref: '#/parameters/XFFHeader'
        - $ref: '#/parameters/BankCodePath'
        - $ref: '#/parameters/AccountIdPath'
        - in: query
          name: query_method
          description: |
                        照会方式  
                        残高の照会方式を設定する。  
                        online=リアルタイムの情報を照会 offline=AnserParaSOLにて保管している情報を照会  
                        外貨口座、投信口座については、リアルタイムでの残高情報を取得できないためオンライン方式を指定できない。  
                        本パラメータを設定しない場合は、AnserParaSOLにてサービス時間を確認し、照会可能な方式で情報を取得する。
          required: false
          type: string
          x-example: 'online'
          enum:
           - 'online'
           - 'offline'
        - $ref: '#/parameters/AutoManualModeQuery'
      responses:
        '200':
          description: 'OK'
          schema:
            $ref: '#/definitions/AccountResponse'
        '400':
          description: 'Bad Request'
          headers:
            WWW-Authenticate:
              description: |
                            Bearer認証でエラーとなった場合、ヘッダにWWW-Authenticateが設定される。realmはParaSOL-APIのルートが設定される。  
                            Bearer realm="example",error="invalid_client"
              type: string
              format: "半角英数字記号"
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
        '401':
          description: 'Unauthorized'
          headers:
            WWW-Authenticate:
              description: |
                            Bearer認証でエラーとなった場合、ヘッダにWWW-Authenticateが設定される。realmはParaSOL-APIのルートが設定される。  
                            Bearer realm="example",error="invalid_client"
              type: string
              format: "半角英数字記号"
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
        '403':
          description: 'Forbidden'
          headers:
            WWW-Authenticate:
              description: |
                            Bearer認証でエラーとなった場合、ヘッダにWWW-Authenticateが設定される。realmはParaSOL-APIのルートが設定される。  
                            Bearer realm="example",error="invalid_client"
              type: string
              format: "半角英数字記号"
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
        '404':
          description: 'Not Found'
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
        '500':
          description: 'Internal Server Error'
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
        '503':
          description: 'Service Unavailable'
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
        '504':
          description: 'Gateway Timeout'
          schema:
            $ref: '#/definitions/RFC7807ErrorResponse'
  /banks/{bank_code}/accounts/{account_id}/transactions:
    get:
      tags: [accounts]
      summary: 入出金取引明細照会
      description: 指定した口座の入出金取引明細を照会する。
      operationId: getTransactions
      produces:
        - application/json;charset=UTF-8
        - application/problem+json;charset=UTF-8
      parameters:
        - $ref: '#/parameters/AuthorizationHeaderBearer'
        - $ref: '#/parameters/XFFHeader'
        - $ref: '#/parameters/BankCodePath'
        - $ref: '#/parameters/AccountIdPath'
        - in: query
          name: query_method
          description: |
                        照会方式  
                        取引明細の照会方式を設定する。  
                        online=リアルタイムの情報を照会 offline=AnserParaSOLにて保管している情報を照会  
                        外貨口座、投信口座については、リアルタイムでの取引明細情報を取得できないためオンライン方式を指定できない。  
                        本パラメータを設定しない場合は、AnserParaSOLにてサービス時間を確認し、照会可能な方式で情報を取得する。
          required: false
          type: string
          x-example: 'online'
          enum:
           - 'online'
           - 'offline'
        - $ref: '#/parameters/AutoManualModeQuery'
        - in: query
          name: date_from
          description: |
                        対象期間(from)
          required: true
          type: string
          format: date
          x-example: '2018-04-01'
          minLength: 10
          maxLength: 10
        - in: query
          name: date_to
          description: |
                        対象期間(to)  
                        照会方式がオンライン方式の場合、返却できる明細は最大1年分とする。  
                        照会方式がオフライン方式の場合は金融機関ごとに返却できる明細の期間が異なる。  
                        ただし、オンライン方式の場合は金融機関ホストの性能や電文量によりエラーとなる場合があるため、1ヵ月以上の期間は指定しないことを推奨する。
          required: true
          type: string
          format: date
          x-example: '2018-04-10'
          minLength: 10
          maxLength: 10
      responses:
        '200':
          description: OK
          schema:
            type: object
            required:
              - account_id
              - currency_code
              - base_date
              - base_time
              - has_next
              - count
              - transactions
            properties:
              account_id:
                type: string
                format: "半角英数字記号"
                example: 'p-12345678-y-1234'
                description: |
                              口座識別子
                x-nullable: false
                minLength: 7
                maxLength: 29
              currency_code:
                type: string
                format: "半角英字"
                example: 'USD'
                description: |
                              通貨コード  
                              ISO4217で規定されているコードを設定する。
                x-nullable: false
                minLength: 3
                maxLength: 3
              base_date:
                type: string
                format: date
                example: '2018-01-01'
                description: |
                              基準日
                x-nullable: true
                minLength: 10
                maxLength: 10
              base_time:
                type: string
                format: "半角数字記号"
                example: '12:30:00+09:00'
                description: | 
                              基準時刻  
                              hh:mm:00+09:00の形式で時刻を返却する。
                x-nullable: true
                minLength: 14
                maxLength: 14
              has_next:
                type: boolean
                example: false
                description: | 
                              継続情報(next)  
                              本APIでは一括で明細を返却するためfalseを返却する。
                enum: 
                 - false
                x-nullable: false
              count:
                type: integer
                example: 10
                description: |
                              取得取引件数  
                              取得した取引明細件数を設定する。
                x-nullable: false
                minimum: 0
                maximum: 9999
              transactions:
                type: array
                description: |
                              取引一覧(リスト)
                items:
                  type: object
                  required:
                    - transaction_id
                    - status
                    - transaction_date
                    - value_date
                    - transaction_detail
                    - transaction_type
                    - amount
                    - transaction_balance
                    - exchange_rate
                    - operation
                    - abstract
                    - customer_id
                  properties:
                    transaction_id:
                       type: string
                       format: "半角英数字"
                       example: '11100001'
                       description: |
                                    取引識別子
                       x-nullable: false
                       minLength: 1
                       maxLength: 8
                    status:
                       type: string
                       example: 'normal'
                       description: |
                                     明細ステータス  
                                     normal=正常 cancelled=取消 insufficient_data=欠番  
                                     金融機関システムの何らかの理由により取引金額など一部情報が連携できない場合に欠番が設定される。
                       x-nullable: false
                       enum:
                         - 'normal'
                         - 'cancelled'
                         - 'insufficient_data'
                    transaction_date:
                      type: string
                      format: date
                      example: '2017-05-30'
                      description: |
                                    取引日  
                                    金融機関の設定により、「YYYY-MM-DD」「0000-MM-DD」「0000-00-DD」のいずれかの形式で値を返却する。
                      x-nullable: true
                      minLength: 10
                      maxLength: 10
                    value_date:
                      type: string
                      format: date
                      example: '2017-06-30'
                      description: |
                                     起算日  
                                     金融機関の設定により、「YYYY-MM-DD」「0000-MM-DD」「0000-00-DD」のいずれかの形式で値を返却する。
                      x-nullable: true
                      minLength: 10
                      maxLength: 10
                    transaction_detail:
                      type: string
                      format: "半角全角"
                      example: '預入'
                      description: |
                                    取引内容
                      x-nullable: false
                      minLength: 1
                      maxLength: 30
                    transaction_type:
                      type: string
                      example: payin
                      description: |
                                    入払区分  
                                    入出金の種別を設定する。payin=入金 payout=出金
                      enum:
                       - 'payin'
                       - 'payout'
                      x-nullable: true
                    amount:
                      type: number
                      example: 10000
                      description: |
                                    取引金額
                      x-nullable: true
                      minimum: -999999999999.99
                      maximum: 9999999999999.99
                    transaction_balance:
                      type: number
                      example: 1000000
                      description: |
                                    取引後残高
                      x-nullable: true
                      minimum: -999999999999.99
                      maximum: 9999999999999.99
                    exchange_rate:
                      type: number
                      example: 101.85
                      description: |
                                    適用相場  
                                    対象口座が外貨口座の場合、適用相場を設定する。  
                                    外貨口座以外の場合、Nullを設定する。
                      x-nullable: true
                      minimum: 0
                      maximum: 999999.99
                    operation:
                      type: string
                      format: "半角全角"
                      example: '円から外貨'
                      description: |
                                    取扱  
                                    対象口座が外貨口座の場合、取扱を設定する。  
                                    外貨口座以外の場合、Nullを設定する。
                      x-nullable: true
                      minLength: 1
                      maxLength: 30
                    abstract:
                      type: string
                      format: "半角全角"
                      example: '水道料金'
                      description: |
                                    摘要内容
                      x-nullable: true
                      minLength: 1
                      maxLength: 48
                    customer_id:
                      type: string
                      format: "半角数字"
                      example: '11111111111111111111'
                      description: |
                                    需要家番号  
                                    円貨口座以外の場合、Nullを設定する。
                      x-nullable: true
                      minLength: 20
                      maxLength: 20
        '400':
          description: 'Bad Request'
          headers:
            WWW-Authenticate:
              description: |
                            Bearer認証でエラーとなった場合、ヘッダにWWW-Authenticateが設定される。realmはParaSOL-APIのルートが設定される。  
                            Bearer realm="example",error="invalid_client"
              type: string
