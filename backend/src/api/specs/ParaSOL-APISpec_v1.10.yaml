  /banks/{bank_code}/userinfo:
    get:
      tags: [personal_information]
      summary: 契約者情報照会
      description: |
                    AnserParaSOL契約者の情報を照会する。  
                    各応答項目にnullが設定される条件は以下のとおり。  
                    ・金融機関の設定や契約者情報の登録状態によりデータが存在しない場合  
                    ・金融機関よりデータ提供を許可されていない場合
      operationId: getUserInfo
      produces:
        - application/json;charset=UTF-8
        - application/problem+json;charset=UTF-8
      parameters:
        - $ref: '#/parameters/AuthorizationHeaderBearer'
        - $ref: '#/parameters/XFFHeader'
        -  name: X-COMPANY-SERVICE-ID
           in: header
           description: |
                         データ提供先企業ID  
                         API連携事業者が本APIの応答結果を第三者に提供する場合、提供先の企業を一意に識別可能なIDを設定する。
           type: string
           format: "半角英数字および-(半角ハイフン)"
           required: false
           x-example: '0000000001'
           minLength: 1
           maxLength: 50
        -  name: X-API-LINK-INQUIRY-NO
           in: header
           description: |
                         API連携事業者取引照会番号  
                         API連携事業者が本APIの取引を一意に識別する必要がある場合、本項目に一意に識別可能なIDを設定する。
           type: string
           format: "半角英数字および-(半角ハイフン)"
           required: false
