  /banks/{bank_code}/accounts/{account_id}/card_loan_contracts':
    get:
      tags: [accounts]
      summary: カードローン契約内容照会
      description: 指定した口座のカードローン契約内容を照会する。
      operationId: getCardLoanContracts
      produces:
